name = "sikesra"
compatibility_date = "2026-05-09"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "sikesra"
database_id = "e2902bf9-1648-4a46-8971-e4acadfa09ec"

[[d1_databases]]
binding = "SIKESRA_DB"
database_name = "sikesra"
database_id = "e2902bf9-1648-4a46-8971-e4acadfa09ec"

[[r2_buckets]]
binding = "SIKESRA_DOCUMENTS"
bucket_name = "sikesra"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "sikesra"

# R2 Lifecycle Rules
# Documents: retained based on classification (see docs/sikesra/R2_LIFECYCLE_POLICY.md)
# Imports: auto-delete after 90 days
# Exports: auto-delete after 30 days
[[r2_lifecycle_rules]]
bucket = "sikesra"
enabled = true
prefix = "imports/"
actions = { delete = true }
conditions = { age = 90 }

[[r2_lifecycle_rules]]
bucket = "sikesra"
enabled = true
prefix = "exports/"
actions = { delete = true }
conditions = { age = 30 }

[[kv_namespaces]]
binding = "SESSION"
id = "29e3fd9bbf2f448fa3b36185b8be299a"

[[worker_loaders]]
binding = "LOADER"

[observability]
enabled = true
