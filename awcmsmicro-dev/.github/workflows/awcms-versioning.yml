name: AWCMS Versioning

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-pr:
    name: Create AWCMS Version PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply AWCMS versioning and changelogs
        run: node .github/scripts/awcms-version.mjs version

      - name: Detect version changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git author
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit AWCMS version updates
        if: steps.diff.outputs.changed == 'true'
        run: |
          git checkout -B awcms-release/main
          git add .
          git commit -m "chore: version awcms packages"

      - name: Push release branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --force-with-lease "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" awcms-release/main

      - name: Create or update release PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          pr_number="$(gh pr list --head awcms-release/main --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "chore: version awcms packages" --body "Automated AWCMS-Micro version PR for plugin and template version bumps plus changelog updates."
          else
            gh pr create \
              --base main \
              --head awcms-release/main \
              --title "chore: version awcms packages" \
              --body "Automated AWCMS-Micro version PR for plugin and template version bumps plus changelog updates."
          fi

      - name: No AWCMS version changes
        if: steps.diff.outputs.changed != 'true'
        run: echo "No pending AWCMS changesets detected."
