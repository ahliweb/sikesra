name: Deploy SIKESRA to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

  test:
    name: Run Tests with Coverage
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            const total = data.total;
            const lines = total.lines.pct;
            const branches = total.branches.pct;
            const functions = total.functions.pct;
            const statements = total.statements.pct;
            console.log(\`Lines: \${lines}%, Branches: \${branches}%, Functions: \${functions}%, Statements: \${statements}%\`);
            if (lines < 80 || branches < 70 || functions < 70 || statements < 80) {
              console.error('Coverage threshold not met!');
              process.exit(1);
            }
          ")
          echo "$COVERAGE"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: |
          AUDIT_RESULT=$(npm audit --json 2>/dev/null || true)
          CRITICAL=$(echo "$AUDIT_RESULT" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            const critical = Object.values(data.vulnerabilities || {}).filter(v => v.severity === 'critical').length;
            const high = Object.values(data.vulnerabilities || {}).filter(v => v.severity === 'high').length;
            console.log(\`Critical: \${critical}, High: \${high}\`);
            if (critical > 0) {
              console.error('Critical vulnerabilities found!');
              process.exit(1);
            }
          ")
          echo "$AUDIT_RESULT"

  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build application
        run: npm run build

      - name: Run postbuild script
        run: node scripts/postbuild.mjs

      - name: Validate build artifacts
        run: |
          echo "Checking build artifacts..."
          test -d dist && echo "dist/ directory exists" || exit 1
          test -f dist/server/worker-wrapper.mjs && echo "worker-wrapper.mjs exists" || exit 1
          test -f dist/server/wrangler.json && echo "wrangler.json exists" || exit 1
          echo "Build artifacts validated"

      - name: Validate wrangler.json
        run: |
          node -e "
            const config = require('./dist/server/wrangler.json');
            if (!config.main || config.main !== 'worker-wrapper.mjs') {
              console.error('wrangler.json main field not set correctly');
              process.exit(1);
            }
            console.log('wrangler.json validated');
          "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: build-output
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy Cloudflare Workers and R2
    runs-on: ubuntu-latest
    needs: [quality, test, security, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  smoke-test:
    name: Post-Deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Run smoke tests
        run: |
          WORKER_URL="https://sikesrakobar.ahlikoding.com"
          echo "Running smoke tests against $WORKER_URL"

          # Test 1: Health check
          echo "Test 1: Health endpoint..."
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/health" || echo "000")
          if [ "$HEALTH_STATUS" = "200" ] || [ "$HEALTH_STATUS" = "404" ]; then
            echo "✅ Health endpoint responded ($HEALTH_STATUS)"
          else
            echo "⚠️ Health endpoint returned $HEALTH_STATUS"
          fi

          # Test 2: Public SIKESRA page
          echo "Test 2: Public SIKESRA page..."
          SIKESRA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/sikesra" || echo "000")
          if [ "$SIKESRA_STATUS" = "200" ]; then
            echo "✅ SIKESRA page responded ($SIKESRA_STATUS)"
          else
            echo "⚠️ SIKESRA page returned $SIKESRA_STATUS"
          fi

          # Test 3: EmDash admin
          echo "Test 3: EmDash admin..."
          ADMIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/_emdash/admin" || echo "000")
          if [ "$ADMIN_STATUS" = "200" ] || [ "$ADMIN_STATUS" = "302" ]; then
            echo "✅ EmDash admin responded ($ADMIN_STATUS)"
          else
            echo "⚠️ EmDash admin returned $ADMIN_STATUS"
          fi

          # Test 4: Public API
          echo "Test 4: Public API..."
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/_emdash/api/plugins/sikesra/public/summary" || echo "000")
          if [ "$API_STATUS" = "200" ]; then
            echo "✅ Public API responded ($API_STATUS)"
          else
            echo "⚠️ Public API returned $API_STATUS"
          fi

          echo "Smoke tests completed"
